# GoReleaser config — ccc (c3)
# https://goreleaser.com — version 2 schema
#
# Two binaries: c3-server (with baked-in port 7755) and c3-bin.
# Web bundle is regenerated by the `make web` hook below so go:embed
# in internal/webdev/ picks up the latest client.

version: 2

project_name: ccc

before:
  hooks:
    - go mod tidy
    # Rebuilds web/dist into internal/webdev/assets so the c3-server
    # binary embeds the current SPA. Needed because the embedded
    # assets are git-tracked but may lag behind web/src changes.
    - make web

builds:
  - id: c3-server
    main: ./cmd/c3-server
    binary: c3-server
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      # Installed builds use the fixed port; source builds keep 0.
      - -X main.defaultListenPort=7755
      - -X main.version={{ .Version }}
  - id: c3-bin
    main: ./cmd/c3-bin
    binary: c3-bin
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - GUI-DESIGN.md
      - shell/c3.sh
      - shell/c3.fish

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge "

brews:
  - name: c3
    repository:
      owner: binhsonnguyen
      name: homebrew-tap
      branch: main
    directory: Formula
    homepage: "https://github.com/binhsonnguyen/ccc"
    description: "Personal Claude Code session manager — CLI + web GUI"
    license: "MIT"
    # fzf powers the c3 picker; claude is recommended but not strictly a
    # build dep, so left out of dependencies (most users have it already
    # if they want c3).
    dependencies:
      - name: fzf
    install: |
      bin.install "c3-bin"
      bin.install "c3-server"
      (etc/"c3").install "shell/c3.sh"
      # share/fish/vendor_functions.d resolves to fish's auto-load
      # path under HOMEBREW_PREFIX. fish_function_path DSL is not in
      # scope inside the per-arch define_method(:install) blocks
      # goreleaser generates, so we hand-roll the path.
      (share/"fish/vendor_functions.d").install "shell/c3.fish"
    caveats: |
      To enable the `c3` command in bash/zsh, add to your shell rc:

        source "$(brew --prefix)/etc/c3/c3.sh"

      Fish users: the function is auto-loaded.

      The GUI server listens on 127.0.0.1:7755 by default. Override
      with C3_SERVER_PORT=N (or =0 for a random port).

      Optional: run c3-server in the background via brew services so
      `c3 gui` opens the browser instantly without spawning anything:

        brew services start c3

      (Service mode disables the idle auto-shutdown.)
    # brew services integration. Goreleaser renders this as the
    # formula's `service do ... end` block, which brew translates to a
    # launchd plist on macOS / systemd unit on Linux.
    service: |
      run [opt_bin/"c3-server"]
      keep_alive true
      log_path var/"log/c3-server.log"
      error_log_path var/"log/c3-server.log"
      # Idle shutdown makes sense when c3 gui spawns the server on
      # demand, but defeats the point of running as a service.
      environment_variables C3_SERVER_IDLE_MINUTES: "0"
    test: |
      system "#{bin}/c3-bin", "--version"
      system "#{bin}/c3-server", "--version"

release:
  github:
    owner: binhsonnguyen
    name: ccc
  draft: false
  prerelease: auto
  header: |
    ## ccc {{ .Tag }}

    Personal Claude Code session manager — CLI (`c3`) and web GUI
    (`c3 gui`). See [README](https://github.com/binhsonnguyen/ccc#readme)
    for install + usage.
  footer: |
    ---
    Install: download the archive for your OS/arch, extract, and put
    `c3-bin` + `c3-server` somewhere on your `$PATH`. The installed
    `c3-server` listens on `127.0.0.1:7755` by default; override with
    `C3_SERVER_PORT`.
