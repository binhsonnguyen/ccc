# GoReleaser config — ccc (c3)
# https://goreleaser.com — version 2 schema
#
# Two binaries: c3-server (with baked-in port 7755) and c3-bin.
# Web bundle is regenerated by the `make web` hook below so go:embed
# in internal/webdev/ picks up the latest client.

version: 2

project_name: ccc

before:
  hooks:
    - go mod tidy
    # Rebuilds web/dist into internal/webdev/assets so the c3-server
    # binary embeds the current SPA. Needed because the embedded
    # assets are git-tracked but may lag behind web/src changes.
    - make web

builds:
  - id: c3-server
    main: ./cmd/c3-server
    binary: c3-server
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      # Installed builds use the fixed port; source builds keep 0.
      - -X main.defaultListenPort=7755
      - -X main.version={{ .Version }}
  - id: c3-bin
    main: ./cmd/c3-bin
    binary: c3-bin
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - GUI-DESIGN.md
      - shell/c3.sh
      - shell/c3.fish

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge "

# Homebrew Cask. GoReleaser fully deprecated `brews` (binary-install
# formulas) in v2.16; casks are the supported path for pre-compiled
# binaries. Two things the old formula did don't exist for casks and are
# handled in the app instead:
#   - the `c3` shell function: shipped via `c3-bin shell-init <shell>`
#     (see caveats) instead of installing shell files into the prefix;
#   - the always-on server: `c3 service {start|stop|status}` writes a
#     LaunchAgent (macOS) / systemd --user unit (Linux), replacing the
#     formula-only `brew services` integration.
# Existing formula users auto-migrate via tap_migrations.json in the tap
# repo (Homebrew >= 5.0.0, Nov 2025). See docs/RELEASE.md.
homebrew_casks:
  - name: c3
    repository:
      owner: binhsonnguyen
      name: homebrew-tap
      branch: main
    homepage: "https://github.com/binhsonnguyen/ccc"
    description: "Personal Claude Code session manager — CLI + web GUI"
    # fzf powers the c3 picker; claude is a runtime prereq but not a brew
    # package, so it's left to the user.
    dependencies:
      - formula: fzf
    binaries:
      - c3-bin
      - c3-server
    # The release binaries are unsigned; strip the quarantine bit on install
    # so Gatekeeper doesn't block them. Third-party tap → this is allowed and
    # is the documented alternative to code signing.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/c3-bin", "#{staged_path}/c3-server"]
          end
    caveats: |
      Enable the `c3` command in your shell rc:

        bash/zsh:  eval "$(c3-bin shell-init zsh)"
        fish:      c3-bin shell-init fish | source

      The GUI server listens on 127.0.0.1:7755 by default. Override with
      C3_SERVER_PORT=N (or =0 for a random port).

      Run it always-on in the background (replaces `brew services start c3`):

        c3 service start        # stop with: c3 service stop
    # Opt-in cleanup on `brew uninstall --zap`. Only c3's OWN metadata +
    # the service unit — never claude's session files (those live in
    # ~/.claude and are not c3's to remove).
    zap:
      # Boot the LaunchAgent out before deleting its plist, so --zap doesn't
      # leave an orphaned (respawning) job pointing at a removed binary.
      launchctl:
        - com.c3.server
      trash:
        - "~/.local/share/c3"
        - "~/.local/state/c3"
        - "~/Library/LaunchAgents/com.c3.server.plist"

release:
  github:
    owner: binhsonnguyen
    name: ccc
  draft: false
  prerelease: auto
  header: |
    ## ccc {{ .Tag }}

    Personal Claude Code session manager — CLI (`c3`) and web GUI
    (`c3 gui`). See [README](https://github.com/binhsonnguyen/ccc#readme)
    for install + usage.
  footer: |
    ---
    Install: download the archive for your OS/arch, extract, and put
    `c3-bin` + `c3-server` somewhere on your `$PATH`. The installed
    `c3-server` listens on `127.0.0.1:7755` by default; override with
    `C3_SERVER_PORT`.
