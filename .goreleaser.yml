# GoReleaser config — ccc (c3)
# https://goreleaser.com — version 2 schema
#
# Two binaries: c3-server (with baked-in port 7755) and c3-bin.
# Web bundle is regenerated by the `make web` hook below so go:embed
# in internal/webdev/ picks up the latest client.

version: 2

project_name: ccc

before:
  hooks:
    - go mod tidy
    # Rebuilds web/dist into internal/webdev/assets so the c3-server
    # binary embeds the current SPA. Needed because the embedded
    # assets are git-tracked but may lag behind web/src changes.
    - make web

builds:
  - id: c3-server
    main: ./cmd/c3-server
    binary: c3-server
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      # Installed builds use the fixed port; source builds keep 0.
      - -X main.defaultListenPort=7755
      - -X main.version={{ .Version }}
  - id: c3-bin
    main: ./cmd/c3-bin
    binary: c3-bin
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - GUI-DESIGN.md
      - shell/c3.sh
      - shell/c3.fish

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge "

release:
  github:
    owner: binhsonnguyen
    name: ccc
  draft: false
  prerelease: auto
  header: |
    ## ccc {{ .Tag }}

    Personal Claude Code session manager — CLI (`c3`) and web GUI
    (`c3 gui`). See [README](https://github.com/binhsonnguyen/ccc#readme)
    for install + usage.
  footer: |
    ---
    Install: download the archive for your OS/arch, extract, and put
    `c3-bin` + `c3-server` somewhere on your `$PATH`. The installed
    `c3-server` listens on `127.0.0.1:7755` by default; override with
    `C3_SERVER_PORT`.
